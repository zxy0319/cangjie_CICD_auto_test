name: Cangjie CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. 下载并解压
    - name: Download and Extract SDK
      run: |
        curl -L -o cangjie-sdk.tar.gz https://github.com/zxy0319/cangjie_CICD_auto_test/releases/download/V1.0/cangjie-sdk-linux-x64-1.0.5.tar.gz
        mkdir -p ${{ github.workspace }}/cangjie
        tar -zxvf cangjie-sdk.tar.gz -C ${{ github.workspace }}/cangjie --strip-components=1

    # 2. 在同一个步骤内：配置环境 -> 验证 -> 跑测试！(绝对不给系统失忆的机会)
    - name: Setup Environment and Run Tests
      run: |
        # 强行把所有工具箱翻出来塞给系统
        export CANGJIE_HOME=${{ github.workspace }}/cangjie
        export PATH=$CANGJIE_HOME/bin:$CANGJIE_HOME/tools/bin:$PATH
        export LD_LIBRARY_PATH=$CANGJIE_HOME/lib:$CANGJIE_HOME/tools/lib:$LD_LIBRARY_PATH
        
        # 激活仓颉官方的环境脚本（双重保险）
        if [ -f "$CANGJIE_HOME/envsetup.sh" ]; then
          source "$CANGJIE_HOME/envsetup.sh"
        fi
        
        echo "============================="
        echo "检查编译器版本："
        cjc -v
        
        echo "============================="
        echo "准备执行单元测试："
        cjpm test
