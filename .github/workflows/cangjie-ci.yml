name: Cangjie CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # 🌟 关键：直接使用官方/社区维护的仓颉环境镜像
    container:
      image: horofg/cangjie:latest

    steps:
    # 第一步：拉取仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 第二步：验证仓颉编译器是否开箱即用
    - name: Verify Cangjie Version
      run: |
        cjc -v

    # 第三步：执行仓颉单元测试
    - name: Run Cangjie Unit Tests
      run: |
        cjpm test
