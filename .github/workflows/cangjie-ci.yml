name: Cangjie CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Cangjie SDK
      run: |
        echo "正在下载仓颉 SDK..."
        # ⚠️ 注意：这里的 URL 需要替换为你们课程官方提供的 Linux 版本 SDK 下载链接
        curl -L -O https://example.com/path/to/cangjie-sdk-linux-x64.tar.gz 
        tar -zxvf cangjie-sdk-linux-x64.tar.gz
        
        echo "CANGJIE_HOME=${{ github.workspace }}/cangjie" >> $GITHUB_ENV
        echo "${{ github.workspace }}/cangjie/bin" >> $GITHUB_PATH

    - name: Verify Cangjie Version
      run: |
        cjc -v

    - name: Run Cangjie Unit Tests
      run: |
        cjpm test
