name: Cangjie CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. 下载并解压 SDK
    - name: Download and Extract SDK
      run: |
        curl -L -o cangjie-sdk.tar.gz https://github.com/zxy0319/cangjie_CICD_auto_test/releases/download/V1.0/cangjie-sdk-linux-x64-1.0.5.tar.gz
        mkdir -p ${{ github.workspace }}/cangjie
        tar -zxvf cangjie-sdk.tar.gz -C ${{ github.workspace }}/cangjie --strip-components=1

    # 2. 单文件直接编译并运行！
    - name: Compile and Run Cangjie File
      run: |
        export CANGJIE_HOME=${{ github.workspace }}/cangjie
        export PATH=$CANGJIE_HOME/bin:$PATH
        export LD_LIBRARY_PATH=$CANGJIE_HOME/lib:$LD_LIBRARY_PATH
        
        echo "============================="
        echo "1. 检查编译器状态："
        cjc -v
        
        echo "============================="
        echo "2. 开始编译 main.cj..."
        # 用 cjc 直接编译你的单文件，生成可执行文件 output
        cjc main.cj -o output
        
        echo "============================="
        echo "3. 运行编译出的程序，查看输出结果："
        # 运行它！
        ./output
